apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellar-footprint-service
  labels:
    app: stellar-footprint-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stellar-footprint-service
  template:
    metadata:
      labels:
        app: stellar-footprint-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: stellar-footprint-service
          image: stellar-footprint-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            # Load all ConfigMap entries as environment variables
            - configMapRef:
                name: stellar-footprint-config
            # Load all Secret entries as environment variables
            - secretRef:
                name: stellar-footprint-secrets
          env:
            # Secret references for RPC URLs (can be overridden if needed)
            - name: TESTNET_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: stellar-footprint-secrets
                  key: TESTNET_RPC_URL
            - name: MAINNET_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: stellar-footprint-secrets
                  key: MAINNET_RPC_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
