apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stellar-footprint-service
  labels:
    app: stellar-footprint-service
spec:
  podSelector:
    matchLabels:
      app: stellar-footprint-service
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow inbound traffic on port 3000 from the ingress controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow egress to Redis (default port 6379) within the cluster
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # Allow egress to Stellar RPC endpoints (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
